; ─────────────────────────────────────────────────────────────────────────────
; Doorbell context — handles all calls to/from the Vivint doorbell
; ─────────────────────────────────────────────────────────────────────────────
[doorbell]

; ── Incoming ring from doorbell ────────────────────────────────────────────
; The doorbell sends a SIP INVITE when the button is pressed.
; 1. Fire a webhook to Home Assistant (so HA automations can trigger).
; 2. Answer and bridge audio to go2rtc so viewers can hear the doorbell.
; ──────────────────────────────────────────────────────────────────────────
exten => _X.,1,NoOp(Doorbell ring from ${CALLERID(all)})
 same => n,Set(CHANNEL(hangup_handler_push)=doorbell_cleanup,s,1)
 same => n,AGI(notify_ha.agi,${HA_BASE_URL},${HA_WEBHOOK_ID})
 same => n,Answer()
 same => n,EAGI(bridge_rtp.agi)
 same => n,Hangup()

; ── Outgoing talk to doorbell ─────────────────────────────────────────────
; Called from the orchestration API (POST /api/talk) to open a two-way audio
; session between the ONVIF/RTSP viewer and the doorbell speaker.
; ──────────────────────────────────────────────────────────────────────────
exten => doorbell_talk,1,NoOp(Opening talk channel to doorbell)
 same => n,Dial(PJSIP/${SIP_DOORBELL_USERNAME}@${SIP_DOORBELL_DOMAIN},,b(doorbell_talk_bridge^s^1))
 same => n,Hangup()

; Bridge the outgoing call's audio to the go2rtc backchannel RTP port
[doorbell_talk_bridge]
exten => s,1,NoOp(Bridging outgoing audio)
 same => n,EAGI(bridge_rtp.agi)
 same => n,Return()

; ── Cleanup handler ──────────────────────────────────────────────────────
[doorbell_cleanup]
exten => s,1,NoOp(Call ended, channel=${CHANNEL})
 same => n,Return()
