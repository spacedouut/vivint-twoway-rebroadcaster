; ─────────────────────────────────────────────────────────────────────────────
; Transport
; ─────────────────────────────────────────────────────────────────────────────
[transport-wss]
type=transport
protocol=wss
bind=0.0.0.0:5061

; ─────────────────────────────────────────────────────────────────────────────
; Outbound registration to Vivint SIP server
; ─────────────────────────────────────────────────────────────────────────────
[vivint-registration]
type=registration
transport=transport-wss
outbound_auth=vivint-auth
server_uri=sip:${SIP_SERVER}
client_uri=sip:${SIP_USERNAME}@${SIP_SERVER}
contact_user=${SIP_USERNAME}
retry_interval=30
max_retries=999
expiration=3600

[vivint-auth]
type=auth
auth_type=userpass
username=${SIP_USERNAME}
password=${SIP_PASSWORD}

; ─────────────────────────────────────────────────────────────────────────────
; Endpoint for the Vivint doorbell
; ─────────────────────────────────────────────────────────────────────────────
[vivint_doorbell]
type=endpoint
transport=transport-wss
context=doorbell
disallow=all
allow=ulaw
allow=alaw
allow=opus
aors=vivint_doorbell
outbound_auth=vivint-auth
from_user=${SIP_USERNAME}
from_domain=${SIP_SERVER}
; DTMF via RFC 2833 in-band
dtmf_mode=rfc4733

[vivint_doorbell]
type=aor
contact=sip:${SIP_DOORBELL_USERNAME}@${SIP_DOORBELL_DOMAIN}
qualify_frequency=30

; ─────────────────────────────────────────────────────────────────────────────
; Allow anonymous incoming calls (doorbell rings us from its own SIP identity)
; ─────────────────────────────────────────────────────────────────────────────
[anonymous]
type=endpoint
context=doorbell
disallow=all
allow=ulaw
allow=alaw
allow=opus
